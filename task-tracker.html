                                            <div id="snooze-menu-${task.id}" class="snooze-menu">
                                                <button class="snooze-option" onclick="taskManager.snoozeTask(${task.id}, 1); taskManager.closeAllSnoozeMenus();">1 day</button>
                                                <button class="snooze-option" onclick="taskManager.snoozeTask(${task.id}, 3); taskManager.closeAllSnoozeMenus();">3 days</button>
                                                <button class="snooze-option" onclick="taskManager.snoozeTask(${task.id}, 7); taskManager.closeAllSnoozeMenus();">1 week</button>
                                                <button class="snooze-option" onclick="taskManager.snoozeTask(${task.id}, 14); taskManager.closeAllSnoozeMenus();">2 weeks</button>
                                            </div>
                                        </div>
                                        <button class="btn-delete" onclick="taskManager.deleteTask(${task.id})">Delete</button>
                                    </div>
                                </div>
                                ${task.description ? `<div class="task-description">${this.escapeHtml(task.description)}</div>` : ''}
                                <div class="task-meta">
                                    <div class="meta-item">
                                        <span class="meta-label">Created:</span>
                                        <span>${createdDate.toLocaleDateString()}</span>
                                    </div>
                                    <div class="meta-item">
                                        <span class="meta-label">Due:</span>
                                        <span>${dueDate ? dueDate.toLocaleDateString() : 'Open-ended'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    })
                    .join('');
            }

            toggleSnoozeMenu(id, event) {
                event.stopPropagation();
                this.closeAllSnoozeMenus();
                const menu = document.getElementById(`snooze-menu-${id}`);
                if (menu) {
                    menu.classList.add('active');
                }
            }

            closeAllSnoozeMenus() {
                document.querySelectorAll('.snooze-menu').forEach(menu => {
                    menu.classList.remove('active');
                });
            }

            toggleSection(section) {
                const contentId = section + 'Content';
                const buttonId = 'toggle' + section.charAt(0).toUpperCase() + section.slice(1);
                const content = document.getElementById(contentId);
                const button = document.getElementById(buttonId);
                
                if (!content || !button) return;

                const isCollapsed = content.classList.contains('collapsed');
                const parentBox = content.closest('.draggable-box');
                
                if (isCollapsed) {
                    content.style.maxHeight = content.scrollHeight + 'px';
                    setTimeout(() => {
                        content.classList.remove('collapsed');
                        content.style.maxHeight = 'none';
                    }, 10);
                    button.textContent = '−';
                    if (parentBox) parentBox.classList.remove('has-collapsed-content');
                    this.collapsedSections[section] = false;
                } else {
                    content.style.maxHeight = content.scrollHeight + 'px';
                    setTimeout(() => {
                        content.style.maxHeight = '0';
                        content.classList.add('collapsed');
                    }, 10);
                    button.textContent = '+';
                    if (parentBox) parentBox.classList.add('has-collapsed-content');
                    this.collapsedSections[section] = true;
                }
                
                this.saveCollapsedSections();
            }

            restoreCollapsedSections() {
                Object.keys(this.collapsedSections).forEach(section => {
                    if (this.collapsedSections[section]) {
                        const contentId = section + 'Content';
                        const buttonId = 'toggle' + section.charAt(0).toUpperCase() + section.slice(1);
                        const content = document.getElementById(contentId);
                        const button = document.getElementById(buttonId);
                        
                        if (content && button) {
                            content.classList.add('collapsed');
                            content.style.maxHeight = '0';
                            button.textContent = '+';
                            const parentBox = content.closest('.draggable-box');
                            if (parentBox) parentBox.classList.add('has-collapsed-content');
                        }
                    }
                });
            }

            loadCollapsedSections() {
                const saved = localStorage.getItem('collapsedSections');
                return saved ? JSON.parse(saved) : {};
            }

            saveCollapsedSections() {
                localStorage.setItem('collapsedSections', JSON.stringify(this.collapsedSections));
            }

            setupDragAndDrop() {
                const container = document.getElementById('draggableContainer');
                const draggables = document.querySelectorAll('.draggable-box');
                
                let draggedElement = null;

                draggables.forEach(draggable => {
                    const header = draggable.querySelector('.section-header');
                    
                    // Make only the header draggable, not the whole box
                    header.addEventListener('mousedown', (e) => {
                        // Don't start drag if clicking on the minimize button
                        if (e.target.closest('.minimize-btn')) {
                            return;
                        }
                        draggable.setAttribute('draggable', 'true');
                    });

                    draggable.addEventListener('dragstart', (e) => {
                        draggedElement = draggable;
                        draggable.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });

                    draggable.addEventListener('dragend', () => {
                        draggable.classList.remove('dragging');
                        draggable.setAttribute('draggable', 'false');
                        this.saveBoxOrder();
                    });
                });

                container.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (!draggedElement) return;
                    
                    const afterElement = this.getDragAfterElement(container, e.clientY);
                    if (afterElement == null) {
                        container.appendChild(draggedElement);
                    } else {
                        container.insertBefore(draggedElement, afterElement);
                    }
                });
            }

            getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.draggable-box:not(.dragging)')];

                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;

                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }

            loadBoxOrder() {
                const saved = localStorage.getItem('boxOrder');
                return saved ? JSON.parse(saved) : ['calendar', 'taskForm', 'quoteForm'];
            }

            saveBoxOrder() {
                const container = document.getElementById('draggableContainer');
                const boxes = container.querySelectorAll('.draggable-box');
                const order = Array.from(boxes).map(box => box.dataset.boxId);
                localStorage.setItem('boxOrder', JSON.stringify(order));
            }

            restoreBoxOrder() {
                const container = document.getElementById('draggableContainer');
                const boxes = {};
                
                container.querySelectorAll('.draggable-box').forEach(box => {
                    boxes[box.dataset.boxId] = box;
                });

                this.boxOrder.forEach(boxId => {
                    if (boxes[boxId]) {
                        container.appendChild(boxes[boxId]);
                    }
                });
            }

            goToDueToday() {
                // Switch to task list view
                this.setView('list');
                // Set filter to today
                this.setFilter('today');
                // Scroll to task list
                setTimeout(() => {
                    const taskList = document.getElementById('listView');
                    if (taskList) {
                        taskList.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 100);
            }

            goToFollowUpQuotes() {
                // Switch to quotes view
                this.setView('quotes');
                // Set filter to follow-up
                this.setQuoteFilter('follow-up');
                // Scroll to quotes view
                setTimeout(() => {
                    const quotesView = document.getElementById('quotesView');
                    if (quotesView) {
                        quotesView.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 100);
            }

            renderCalendarMini() {
                const year = this.currentMonth.getFullYear();
                const month = this.currentMonth.getMonth();
                
                // Update month display
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
                document.getElementById('calendarMonthMini').textContent = `${monthNames[month]} ${year}`;

                // Get first day of month and number of days
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();

                // Get previous month's last days
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                const prevMonthDays = startingDayOfWeek;

                const grid = document.getElementById('calendarGridMini');
                grid.innerHTML = '';

                // Day headers
                const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                dayHeaders.forEach(day => {
                    const header = document.createElement('div');
                    header.className = 'calendar-day-header';
                    header.textContent = day;
                    grid.appendChild(header);
                });

                const today = new Date();
                const todayStr = today.toISOString().split('T')[0];

                // Previous month days
                for (let i = prevMonthDays - 1; i >= 0; i--) {
                    const day = prevMonthLastDay - i;
                    const date = new Date(year, month - 1, day);
                    this.createCalendarDay(grid, day, date, true);
                }

                // Current month days
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateStr = date.toISOString().split('T')[0];
                    const isToday = dateStr === todayStr;
                    this.createCalendarDay(grid, day, date, false, isToday);
                }

                // Next month days
                const remainingDays = 42 - (prevMonthDays + daysInMonth); // 6 rows * 7 days
                for (let day = 1; day <= remainingDays; day++) {
                    const date = new Date(year, month + 1, day);
                    this.createCalendarDay(grid, day, date, true);
                }
            }

            updateStats() {
                const today = new Date().toISOString().split('T')[0];
                const now = new Date();
                const activeTasks = this.tasks.filter(task => !task.completed);
                
                const dueToday = activeTasks.filter(task => task.dueDate === today).length;
                const openTasks = activeTasks.length;

                document.getElementById('dueToday').textContent = dueToday;
                document.getElementById('openTasks').textContent = openTasks;

                // Update follow-up quotes count in top stats
                const followUpQuotes = this.quotes.filter(q => {
                    if (q.status !== 'active') return false;
                    if (q.snoozedUntil && new Date(q.snoozedUntil) > now) return false;
                    const sentDate = new Date(q.sentDate);
                    const daysSince = Math.floor((new Date() - sentDate) / (1000 * 60 * 60 * 24));
                    const reminderDays = q.reminderInterval || 21;
                    return daysSince >= reminderDays;
                }).length;

                document.getElementById('followUpQuotesTop').textContent = followUpQuotes;
            }

            updateDate() {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
            }

            loadTasks() {
                const saved = localStorage.getItem('dailyTasks');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('dailyTasks', JSON.stringify(this.tasks));
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Export all data to JSON file
            exportData() {
                const data = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    tasks: this.tasks,
                    quotes: this.quotes,
                    collapsedSections: this.collapsedSections,
                    boxOrder: this.boxOrder
                };

                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                const date = new Date().toISOString().split('T')[0];
                link.download = `task-tracker-backup-${date}.json`;
                link.href = url;
                link.click();
                
                URL.revokeObjectURL(url);
                
                alert('✅ Data exported successfully!\n\nSave this file somewhere safe. You can import it later to restore all your tasks and quotes.');
            }

            // Import data from JSON file
            importData(file) {
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        // Validate the data structure
                        if (!data.tasks || !data.quotes) {
                            throw new Error('Invalid backup file format');
                        }
                        
                        // Confirm before overwriting
                        const confirmMsg = `This will replace your current data with:\n\n` +
                            `• ${data.tasks.length} tasks\n` +
                            `• ${data.quotes.length} quotes\n\n` +
                            `Your current data will be backed up automatically.\n\n` +
                            `Continue?`;
                        
                        if (!confirm(confirmMsg)) {
                            return;
                        }
                        
                        // Backup current data first
                        this.exportData();
                        
                        // Import new data
                        this.tasks = data.tasks || [];
                        this.quotes = data.quotes || [];
                        this.collapsedSections = data.collapsedSections || {};
                        this.boxOrder = data.boxOrder || ['calendar', 'taskForm', 'quoteForm'];
                        
                        // Save to localStorage
                        this.saveTasks();
                        this.saveQuotes();
                        this.saveCollapsedSections();
                        localStorage.setItem('boxOrder', JSON.stringify(this.boxOrder));
                        
                        // Refresh display
                        this.updateDisplay();
                        this.restoreCollapsedSections();
                        this.restoreBoxOrder();
                        
                        alert('✅ Data imported successfully!\n\nAll your tasks and quotes have been restored.');
                        
                    } catch (error) {
                        alert('❌ Import failed!\n\nThe file may be corrupted or in the wrong format.\n\nError: ' + error.message);
                    }
                };
                
                reader.onerror = () => {
                    alert('❌ Failed to read file. Please try again.');
                };
                
                reader.readAsText(file);
            }
        }

        // Initialize the task manager
        const taskManager = new TaskManager();
        window.taskManager = taskManager;

        // Initialize Google Drive sync
        const googleDriveSync = new GoogleDriveSync();
        window.googleDriveSync = googleDriveSync;

        // Trigger sync when data changes
        const originalSaveTasks = taskManager.saveTasks.bind(taskManager);
        const originalSaveQuotes = taskManager.saveQuotes.bind(taskManager);

        taskManager.saveTasks = function() {
            originalSaveTasks();
            if (googleDriveSync.isSignedIn) {
                googleDriveSync.syncData();
            }
        };

        taskManager.saveQuotes = function() {
            originalSaveQuotes();
            if (googleDriveSync.isSignedIn) {
                googleDriveSync.syncData();
            }
        };

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
